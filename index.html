<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/brand/apc-favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#05101a" />
    <meta
      name="description"
      content="Educational visualization of overhead distribution conductor slap from short-circuit magnetic forces and protective relay/recloser sequencing — APC Relay Engineering."
    />
    <title>Conductor Slap Simulator · APC Relay Engineering</title>
    <!-- Apply the saved theme before first paint to avoid a flash of the wrong theme. -->
    <script>
      ;(function () {
        try {
          var p = localStorage.getItem('csim-theme')
          var t =
            p === 'light' || p === 'dark'
              ? p
              : p === 'system'
                ? window.matchMedia('(prefers-color-scheme: dark)').matches
                  ? 'dark'
                  : 'light'
                : 'dark'
          var r = document.documentElement
          r.classList.add(t)
          r.style.colorScheme = t
        } catch (e) {
          document.documentElement.classList.add('dark')
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
