<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- TODO(APC): replace with the official APC favicon/mark. -->
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cpath fill='%23fd8505' d='M13 2 4.5 13.5H11l-1 8.5 9.5-12H13z'/%3E%3C/svg%3E"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#05101a" />
    <meta
      name="description"
      content="Educational visualization of overhead distribution conductor slap from short-circuit magnetic forces and protective relay/recloser sequencing — APC Relay Engineering."
    />
    <title>Conductor Slap Simulator · APC Relay Engineering</title>
    <!-- Apply the saved theme before first paint to avoid a flash of the wrong theme. -->
    <script>
      ;(function () {
        try {
          var p = localStorage.getItem('csim-theme')
          var t =
            p === 'light' || p === 'dark'
              ? p
              : p === 'system'
                ? window.matchMedia('(prefers-color-scheme: dark)').matches
                  ? 'dark'
                  : 'light'
                : 'dark'
          var r = document.documentElement
          r.classList.add(t)
          r.style.colorScheme = t
        } catch (e) {
          document.documentElement.classList.add('dark')
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
